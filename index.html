
<!DOCTYPE html>
<html>
<head>
    <title>Free AI Image Analyzer</title>
</head>

<body style="text-align:center; font-family:Arial;">

    <h1>AI Image Analyzer 🤖 (Free API)</h1>
    <p>Upload an image to get real AI description</p>

    <input type="file" id="imageInput" accept="image/*">
    <br><br>

    <img id="preview" width="300" style="display:none; border:1px solid #ccc;">
    <br><br>

    <button onclick="analyzeImage()">Analyze</button>

    <p id="result"></p>

    <script>
        const input = document.getElementById("imageInput");
        const preview = document.getElementById("preview");

        input.addEventListener("change", function () {
            const file = input.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        });

        async function analyzeImage() {
            const file = input.files[0];

            if (!file) {
                document.getElementById("result").innerText = "Please select an image!";
                return;
            }

            document.getElementById("result").innerText = "Analyzing with AI... 🤖";

            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/Salesforce/blip-image-captioning-base",
                    {
                        method: "POST",
                       
                        body: file
                    }
                );

                const data = await response.json();

                document.getElementById("result").innerText =
                    "AI Result: " + (data[0]?.generated_text || "No result found");

            } catch (error) {
                document.getElementById("result").innerText =
                    "Error connecting to AI. Try again.";
            }
        }
    </script>

</body>
</html>
