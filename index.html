<!DOCTYPE html>
<html>
<head>
    <title>AI Image Analyzer</title>
</head>

<body style="text-align:center; font-family:Arial;">

    <h1>AI Image Analyzer 🤖</h1>
    <p>Upload an image to get AI description</p>

    <input type="file" id="imageInput" accept="image/*"><br><br>

    <img id="preview" width="300" style="display:none; border:1px solid #ccc;"><br><br>

    <button onclick="analyzeImage()">Analyze</button>

    <p id="result"></p>

    <script>
        const input = document.getElementById("imageInput");
        const preview = document.getElementById("preview");

        input.addEventListener("change", function () {
            const file = input.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        });

        async function analyzeImage() {
            const file = input.files[0];

            if (!file) {
                document.getElementById("result").innerText = "Please select an image!";
                return;
            }

            document.getElementById("result").innerText = "Analyzing...";

            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/Salesforce/blip-image-captioning-base",
                    {
                        method: "POST",
                        headers: {
                            "Authorization": "Bearer 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",
                            "Content-Type": "application/octet-stream"
                        },
                        body: file
                    }
                );

                const data = await response.json();

                document.getElementById("result").innerText =
                    "AI Result: " + (data[0]?.generated_text || "No result");

            } catch (error) {
                document.getElementById("result").innerText =
                    "Error connecting to AI.";
            }
        }
    </script>

</body>
</html>
